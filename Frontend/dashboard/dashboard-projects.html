<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Projects – Neoteric Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="dashboard.css"/>
<style>
.projects-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.project-card{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--gray-5);overflow:hidden;transition:box-shadow var(--tr),transform var(--tr);}
.project-card:hover{box-shadow:0 8px 28px rgba(0,0,0,.08);transform:translateY(-2px);}
.project-thumb{aspect-ratio:16/9;background:var(--gray-4);position:relative;display:flex;align-items:center;justify-content:center;}
.project-thumb-overlay{position:absolute;inset:0;background:rgba(57,71,90,.0);display:flex;align-items:center;justify-content:center;transition:background var(--tr);}
.project-card:hover .project-thumb-overlay{background:rgba(57,71,90,.45);}
.view-btn{opacity:0;background:var(--white);color:var(--dark-1);padding:8px 18px;border-radius:var(--r-full);font-size:13px;font-weight:600;border:none;cursor:pointer;transition:opacity var(--tr);}
.project-card:hover .view-btn{opacity:1;}
.project-body{padding:16px;}
.project-name{font-size:15px;font-weight:700;margin-bottom:3px;}
.project-client{font-size:12px;color:var(--mid-2);margin-bottom:12px;}
.project-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.project-actions{display:flex;gap:8px;}
.act-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-4);background:var(--white);transition:all var(--tr);}
.act-btn:hover{background:var(--gray-5);}
.act-btn.del:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626;}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">Neoteric</div>
  <nav class="sidebar-nav">
    <a href="dashboard-overview.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Overview</a>
    <a href="dashboard-services.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Services</a>
    <a href="dashboard-projects.html" class="nav-item active"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>Projects</a>
    <a href="dashboard-team.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Team</a>
    <a href="dashboard-messages.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Messages</a>
    <a href="dashboard-blog.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>Blog</a>
    <a href="dashboard-settings.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>Settings</a>
    <a href="dashboard-login.html" id="logout-btn" class="nav-item logout" style="margin-top:auto"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Log Out</a>
  </nav>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-title"><h1>Projects Management</h1><p>Manage and track all your projects</p></div>
    <div class="topbar-right">
      <button class="btn-primary" onclick="openModal('addModal')"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add New Project</button>
      <div class="notif-btn"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></div>
      <div class="avatar" id="top-avatar" style="cursor:pointer;"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#999" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
    </div>
  </div>
  <div class="content">
    <div class="stat-cards">
      <div class="stat-card"><div class="stat-info"><p>Total Projects</p><h2 id="stat-total-projects">0</h2><span>All time</span></div><div class="stat-icon"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#39475A" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg></div></div>
      <div class="stat-card"><div class="stat-info"><p>In Progress</p><h2 id="stat-in-progress">0</h2><span>Active now</span></div><div class="stat-icon"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#39475A" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg></div></div>
      <div class="stat-card"><div class="stat-info"><p>Completed</p><h2 id="stat-completed">0</h2><span>Delivered</span></div><div class="stat-icon"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#39475A" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg></div></div>
      <div class="stat-card"><div class="stat-info"><p>On Hold</p><h2 id="stat-on-hold">0</h2><span>Paused</span></div><div class="stat-icon"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#39475A" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></div></div>
    </div>
    <div class="filter-bar">
      <div class="filter-group" style="flex:1"><label>Search Projects</label>
        <div class="search-wrap"><svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input id="filter-search" class="search-input" placeholder="Search by name or client..." oninput="applyFilters()"/></div>
      </div>
      <div class="filter-group"><label>Category</label><select id="filter-category" class="f-select" onchange="applyFilters()"><option value="">All Categories</option><option value="Web Design">Web Design</option><option value="Design">Design</option><option value="Motion">Motion</option><option value="Branding">Branding</option></select></div>
      <div class="filter-group"><label>Status</label><select id="filter-status" class="f-select" onchange="applyFilters()"><option value="">All Status</option><option value="Active">Active</option><option value="Completed">Completed</option><option value="On Hold">On Hold</option></select></div>
    </div>
    <div class="projects-grid" id="projectsGrid"></div>
    <div class="pagination" style="margin-top:20px">
      <span class="pagination-info">Showing 1 to 6 of 6 projects</span>
      <div class="page-btns"><button class="page-btn">Previous</button><button class="page-btn active">1</button><button class="page-btn">Next</button></div>
    </div>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header"><h3>Add New Project</h3><button class="modal-close" onclick="closeModal('addModal')"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-form">
      <div><label class="f-label">Project Name</label><input id="proj-title" class="f-input" placeholder="Project name"/></div>
      <div class="f-row">
        <div><label class="f-label">Client</label><input id="proj-client" class="f-input" placeholder="Client name"/></div>
        <div><label class="f-label">Category</label><select id="proj-category" class="f-input"><option value="Web Design">Web Design</option><option value="Design">Design</option><option value="Motion">Motion</option><option value="Branding">Branding</option></select></div>
      </div>
      <div><label class="f-label">Description</label><textarea id="proj-desc" class="f-input" rows="2" placeholder="Brief project description"></textarea></div>
      <div class="f-row">
        <div><label class="f-label">Status</label><select id="proj-status" class="f-input"><option value="Active">Active</option><option value="Completed">Completed</option><option value="On Hold">On Hold</option></select></div>
        <div><label class="f-label">Deadline</label><input id="proj-deadline" type="date" class="f-input"/></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn-primary" onclick="saveProject()">Save Project</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg><span id="toastMsg"></span></div>


<script src="../js/env.js"></script>
<script src="../js/dashboard_js/projects.js"></script>
<script src="../js/dashboard_js/profile-popup.js"></script>
<script src="../js/dashboard_js/logout.js"></script>
</body>
</html>
