<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Neoteric Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --navy-1: #39475A;
      --gray-4: #D9D9D9;
      --gray-5: #E7E7E7;
      --gray-6: #EAEAEA;
      --dark-1: #191919;
      --mid-2: #666666;
      --white: #ffffff;
      --font: 'Inter', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--white);
      display: flex;
      min-height: 100vh;
    }

    .login-left {
      width: 42%;
      background: var(--gray-6);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .login-left-shape {
      width: 85%;
      aspect-ratio: 3/4;
      background: var(--gray-4);
      border-radius: 40% 40% 50% 50% / 40% 40% 60% 60%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-left-shape svg {
      opacity: .2;
    }

    .login-brand {
      position: absolute;
      top: 36px;
      left: 40px;
      font-size: 20px;
      font-weight: 800;
      color: var(--dark-1);
    }

    .login-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 80px;
    }

    .login-box {
      width: 100%;
      max-width: 400px;
    }

    .login-box h1 {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .login-box h1 span {
      border-bottom: 3px solid var(--navy-1);
      padding-bottom: 2px;
    }

    .login-sub {
      font-size: 14px;
      color: var(--mid-2);
      margin-bottom: 36px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--dark-1);
      margin-bottom: 7px;
    }

    .f-input {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: 1.5px solid var(--gray-4);
      font-family: var(--font);
      font-size: 14px;
      color: var(--dark-1);
      outline: none;
      transition: border-color .22s ease;
    }

    .f-input:focus {
      border-color: var(--navy-1);
      box-shadow: 0 0 0 3px rgba(57, 71, 90, .1);
    }

    .pw-wrap {
      position: relative;
    }

    .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--mid-2);
      display: flex;
      align-items: center;
    }

    .form-extras {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      margin-top: 4px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--mid-2);
      cursor: pointer;
    }

    .remember input[type=checkbox] {
      width: 15px;
      height: 15px;
      accent-color: var(--navy-1);
    }

    .forgot {
      font-size: 13px;
      color: var(--navy-1);
      font-weight: 600;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--dark-1);
      color: var(--white);
      font-size: 15px;
      font-weight: 700;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      transition: background .22s ease, transform .22s ease;
    }

    .login-btn:hover {
      background: var(--navy-1);
      transform: translateY(-1px);
    }

    .login-footer {
      margin-top: 28px;
      text-align: center;
      font-size: 13px;
      color: var(--mid-2);
    }

    .login-footer a {
      color: var(--navy-1);
      font-weight: 600;
    }

    @media(max-width:768px) {
      .login-left {
        display: none;
      }

      .login-right {
        padding: 48px 32px;
      }
    }
  </style>
</head>

<body>
  <div class="login-left">
    <span class="login-brand">Neoteric</span>
    <div class="login-left-shape">
      <svg width="120" height="120" fill="none" viewBox="0 0 120 120">
        <rect x="10" y="25" width="100" height="70" rx="8" stroke="#39475A" stroke-width="3" />
        <circle cx="38" cy="48" r="10" stroke="#39475A" stroke-width="3" />
        <path d="M10 75 l28-24 18 16 16-14 28 22" stroke="#39475A" stroke-width="3" stroke-linejoin="round" />
      </svg>
    </div>
  </div>

  <div class="login-right">
    <div class="login-box">
      <h1><span>Log In</span></h1>
      <p class="login-sub">Welcome back! Sign in to your admin panel.</p>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" class="f-input" placeholder="example@gmail.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" class="f-input" id="pw" placeholder="••••••••" />
          <button class="pw-toggle" onclick="togglePw()" type="button">
            <svg id="eyeIcon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"
              stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
      </div>
      <div id="error-message" style="color: red; font-size: 13px; margin-bottom: 15px; display: none;"></div>
      <div class="form-extras">
        <label class="remember"><input type="checkbox" checked /> Remember me</label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>
      <button class="login-btn" id="loginBtn" onclick="doLogin(event)">Log In</button>
      <div class="login-footer">Don't have an account? <a href="#">Contact Admin</a></div>
    </div>
  </div>

  <script src="../js/env.js"></script>
<script src="../js/dashboard_js/login.js"></script>
</body>

</html>
