<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Team – Neoteric Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="dashboard.css"/>
<style>
.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.member-card{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--gray-5);padding:24px;display:flex;flex-direction:column;align-items:center;text-align:center;transition:box-shadow var(--tr);}
.member-card:hover{box-shadow:0 8px 28px rgba(0,0,0,.08);}
.m-avatar{width:80px;height:80px;border-radius:50%;background:var(--gray-4);display:flex;align-items:center;justify-content:center;margin-bottom:14px;border:3px solid var(--gray-5);}
.m-name{font-size:15px;font-weight:700;margin-bottom:3px;}
.m-role{font-size:12px;color:var(--mid-2);margin-bottom:14px;}
.m-contact{width:100%;text-align:left;margin-bottom:12px;}
.m-contact-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mid-2);margin-bottom:6px;}
.m-skills{width:100%;text-align:left;margin-bottom:14px;}
.m-skills label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--mid-2);display:block;margin-bottom:6px;}
.skills-wrap{display:flex;flex-wrap:wrap;gap:5px;}
.skill-tag{background:var(--gray-5);color:var(--mid-1);padding:3px 10px;border-radius:var(--r-full);font-size:11px;font-weight:600;}
.m-actions{display:flex;gap:8px;width:100%;}
.m-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-4);background:var(--white);transition:all var(--tr);}
.m-btn:hover{background:var(--gray-5);}
.m-btn.del:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626;}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">Neoteric</div>
  <nav class="sidebar-nav">
    <a href="dashboard-overview.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Overview</a>
    <a href="dashboard-services.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Services</a>
    <a href="dashboard-projects.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>Projects</a>
    <a href="dashboard-team.html" class="nav-item active"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Team</a>
    <a href="dashboard-messages.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Messages</a>
    <a href="dashboard-blog.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>Blog</a>
    <a href="dashboard-settings.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>Settings</a>
    <a href="dashboard-login.html" id="logout-btn" class="nav-item logout" style="margin-top:auto"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Log Out</a>
  </nav>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-title"><h1>Team</h1><p>Manage all your team members</p></div>
    <div class="topbar-right">
      <button class="btn-primary" onclick="openModal('addModal')"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Team Member</button>
      <div class="notif-btn"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></div>
      <div class="avatar"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#999" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
    </div>
  </div>
  <div class="content">
    <div class="stat-cards">
      <div class="stat-card"><div class="stat-info"><p>Total Members</p><h2>159</h2><span>All staff</span></div><div class="stat-icon"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#39475A" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div></div>
      <div class="stat-card"><div class="stat-info"><p>Designers</p><h2>40</h2><span>Creative team</span></div><div class="stat-icon"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#39475A" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg></div></div>
      <div class="stat-card"><div class="stat-info"><p>Developers</p><h2>320</h2><span>Engineering</span></div><div class="stat-icon"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#39475A" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></div></div>
      <div class="stat-card"><div class="stat-info"><p>New This Month</p><h2>11</h2><span>Onboarded</span></div><div class="stat-icon"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#39475A" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg></div></div>
    </div>
    <div class="filter-bar">
      <div class="filter-group" style="flex:1"><label>Search Team Members</label>
        <div class="search-wrap"><svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input class="search-input" placeholder="Search by name, position, or email..."/></div>
      </div>
      <div class="filter-group"><label>Department</label><select class="f-select" style="min-width:180px"><option>All Departments</option><option>Design</option><option>Development</option><option>Marketing</option></select></div>
    </div>
    <div class="team-grid" id="teamGrid"></div>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header"><h3>Add Team Member</h3><button class="modal-close" onclick="closeModal('addModal')"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-form">
      <div class="f-row">
        <div><label class="f-label">Full Name</label><input class="f-input" placeholder="Full name"/></div>
        <div><label class="f-label">Role</label><input class="f-input" placeholder="Job title"/></div>
      </div>
      <div class="f-row">
        <div><label class="f-label">Email</label><input class="f-input" placeholder="email@neoteric.tech"/></div>
        <div><label class="f-label">Phone</label><input class="f-input" placeholder="+972 ..."/></div>
      </div>
      <div><label class="f-label">Department</label><select class="f-input"><option>Design</option><option>Development</option><option>Marketing</option></select></div>
      <div><label class="f-label">Skills (comma separated)</label><input class="f-input" placeholder="Figma, React, CSS"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn-primary" onclick="showToast('Member added!');closeModal('addModal')">Add Member</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg><span id="toastMsg"></span></div>

<script>
const members=[
  {name:'Karam Abu Daqan',role:'Motion Graphic Designer',email:'karam@gmail.com',phone:'+972 598273728',skills:['After Effects','Premiere','Motion']},
  {name:'Aisha Dalul',role:'Graphic Designer',email:'aisha@gmail.com',phone:'+972 598273728',skills:['Figma','Illustrator','Photoshop']},
  {name:'Thekra Hammouda',role:'Graphic Designer',email:'thekra@gmail.com',phone:'+972 598273728',skills:['Figma','Branding','Typography']},
  {name:'Aya Abu Zaid',role:'Graphic Designer',email:'karam@gmail.com',phone:'+972 598273728',skills:['Photoshop','Figma']},
  {name:'Deema Al Shorbasy',role:'Frontend Developer',email:'aisha@gmail.com',phone:'+972 598273728',skills:['React','CSS','JavaScript']},
  {name:'Mohammed Al haytham',role:'Frontend Developer',email:'thekra@gmail.com',phone:'+972 598273728',skills:['Vue','Tailwind','TypeScript']},
  {name:'Akram Al salout',role:'Backend Developer',email:'karam@gmail.com',phone:'+972 598273728',skills:['Node.js','PostgreSQL']},
  {name:'Amjad sabbah',role:'Backend Developer',email:'aisha@gmail.com',phone:'+972 598273728',skills:['Python','Django','REST API']},
  {name:'Lama Salha',role:'UXUI Designer',email:'thekra@gmail.com',phone:'+972 598273728',skills:['Figma','Research','Prototyping']},
];
function renderTeam(){
  document.getElementById('teamGrid').innerHTML=members.map((m,i)=>`
    <div class="member-card">
      <div class="m-avatar"><svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="#B2B2B2" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      <div class="m-name">${m.name}</div>
      <div class="m-role">${m.role}</div>
      <div class="m-contact">
        <div class="m-contact-row"><svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>${m.email}</div>
        <div class="m-contact-row"><svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 .84h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>${m.phone}</div>
      </div>
      <div class="m-skills"><label>Skills:</label><div class="skills-wrap">${m.skills.map(s=>`<span class="skill-tag">${s}</span>`).join('')}</div></div>
      <div class="m-actions">
        <button class="m-btn"><svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit</button>
        <button class="m-btn del" onclick="deleteMember(${i})"><svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>Delete</button>
      </div>
    </div>`).join('');
}
renderTeam();
function deleteMember(i){members.splice(i,1);renderTeam();showToast('Member removed.');}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function showToast(msg){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
</script>
<script src="../js/dashboard_js/team.js"></script>
<script src="../js/dashboard_js/logout.js"></script>
</body>
</html>
