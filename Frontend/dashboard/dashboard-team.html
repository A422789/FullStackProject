<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Team – Neoteric Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="dashboard.css"/>
<style>
.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.member-card{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--gray-5);padding:24px;display:flex;flex-direction:column;align-items:center;text-align:center;transition:box-shadow var(--tr);}
.member-card:hover{box-shadow:0 8px 28px rgba(0,0,0,.08);}
.m-avatar{width:80px;height:80px;border-radius:50%;background:var(--gray-4);display:flex;align-items:center;justify-content:center;margin-bottom:14px;border:3px solid var(--gray-5);}
.m-name{font-size:15px;font-weight:700;margin-bottom:3px;}
.m-role{font-size:12px;color:var(--mid-2);margin-bottom:8px;}
.m-dept-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--r-full);background:var(--gray-5);color:var(--mid-1);margin-bottom:14px;}
.m-contact{width:100%;text-align:left;margin-bottom:12px;}
.m-contact-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mid-2);margin-bottom:6px;}
.m-skills{width:100%;text-align:left;margin-bottom:14px;}
.m-skills label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--mid-2);display:block;margin-bottom:6px;}
.skills-wrap{display:flex;flex-wrap:wrap;gap:5px;}
.skill-tag{background:var(--gray-5);color:var(--mid-1);padding:3px 10px;border-radius:var(--r-full);font-size:11px;font-weight:600;}
.m-actions{display:flex;gap:8px;width:100%;}
.m-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-4);background:var(--white);transition:all var(--tr);}
.m-btn:hover{background:var(--gray-5);}
.m-btn.del:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626;}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">Neoteric</div>
  <nav class="sidebar-nav">
    <a href="dashboard-overview.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Overview</a>
    <a href="dashboard-services.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Services</a>
    <a href="dashboard-projects.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>Projects</a>
    <a href="dashboard-team.html" class="nav-item active"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Team</a>
    <a href="dashboard-messages.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Messages</a>
    <a href="dashboard-blog.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>Blog</a>
    <a href="dashboard-settings.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>Settings</a>
    <a href="dashboard-login.html" id="logout-btn" class="nav-item logout" style="margin-top:auto"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Log Out</a>
  </nav>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-title"><h1>Team</h1><p>Manage all your team members</p></div>
    <div class="topbar-right">
      <button class="btn-primary" onclick="openModal('addModal')"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Team Member</button>
      <div class="notif-btn"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></div>
      <div class="avatar" id="top-avatar" style="cursor:pointer;"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#999" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
    </div>
  </div>
  <div class="content">
    <div class="stat-cards">
      <div class="stat-card"><div class="stat-info"><p>Total Members</p><h2 id="stat-total-members">–</h2><span>All staff</span></div><div class="stat-icon"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#39475A" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div></div>
      <div class="stat-card"><div class="stat-info"><p>Designers</p><h2 id="stat-designers">–</h2><span>Creative team</span></div><div class="stat-icon"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#39475A" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg></div></div>
      <div class="stat-card"><div class="stat-info"><p>Developers</p><h2 id="stat-developers">–</h2><span>Engineering</span></div><div class="stat-icon"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#39475A" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></div></div>
      <div class="stat-card"><div class="stat-info"><p>New This Month</p><h2 id="stat-new-month">–</h2><span>Onboarded</span></div><div class="stat-icon"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#39475A" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg></div></div>
    </div>
    <div class="filter-bar">
      <div class="filter-group" style="flex:1"><label>Search Team Members</label>
        <div class="search-wrap"><svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input id="filter-search" class="search-input" placeholder="Search by name, position, or email..."/></div>
      </div>
      <div class="filter-group"><label>Department</label>
        <select id="filter-dept" class="f-select" style="min-width:180px">
          <option value="">All Departments</option>
          <option value="Design">Design</option>
          <option value="Development">Development</option>
          <option value="Marketing">Marketing</option>
        </select>
      </div>
    </div>
    <div class="team-grid" id="teamGrid"></div>
  </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header"><h3>Add Team Member</h3><button class="modal-close" onclick="closeModal('addModal')"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-form">
      <div class="f-row">
        <div><label class="f-label">Full Name *</label><input id="m-fullname" class="f-input" placeholder="Full name"/></div>
        <div><label class="f-label">Role *</label><input id="m-role" class="f-input" placeholder="Job title"/></div>
      </div>
      <div class="f-row">
        <div><label class="f-label">Email *</label><input id="m-email" class="f-input" type="email" placeholder="email@neoteric.tech"/></div>
        <div><label class="f-label">Phone *</label><input id="m-phone" class="f-input" placeholder="+972 ..."/></div>
      </div>
      <div><label class="f-label">Department *</label>
        <select id="m-dept" class="f-input">
          <option value="Design">Design</option>
          <option value="Development">Development</option>
          <option value="Marketing">Marketing</option>
        </select>
      </div>
      <div><label class="f-label">Skills (comma separated)</label><input id="m-skills" class="f-input" placeholder="Figma, React, CSS"/></div>
      <div id="password-field-container"><label class="f-label">Password * (For Account Login)</label><input id="m-password" class="f-input" type="password" placeholder="••••••••"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn-primary" onclick="saveMember()">Save Member</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg><span id="toastMsg"></span></div>

<script src="../js/env.js"></script>
<script src="../js/dashboard_js/team.js"></script>
<script src="../js/dashboard_js/profile-popup.js"></script>
<script src="../js/dashboard_js/logout.js"></script>
</body>
</html>
