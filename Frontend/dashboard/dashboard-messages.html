<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Messages – Neoteric Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="dashboard.css"/>
<style>
.msg-list{display:flex;flex-direction:column;gap:0;}
.msg-item{display:flex;align-items:flex-start;gap:14px;padding:18px;border-bottom:1px solid var(--gray-5);transition:background var(--tr);cursor:pointer;}
.msg-item:last-child{border-bottom:none;}
.msg-item:hover{background:var(--section);}
.msg-item.unread{background:#f0f4f8;}
.msg-avatar{width:44px;height:44px;border-radius:50%;background:var(--gray-4);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.msg-body{flex:1;min-width:0;}
.msg-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;}
.msg-name{font-size:14px;font-weight:700;}
.msg-subject{font-size:13px;font-weight:500;color:var(--dark-1);margin-bottom:5px;}
.msg-preview{font-size:13px;color:var(--mid-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:500px;}
.msg-meta{display:flex;align-items:center;gap:16px;margin-top:7px;flex-wrap:wrap;}
.msg-meta span{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mid-2);}
.msg-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">Neoteric</div>
  <nav class="sidebar-nav">
    <a href="dashboard-overview.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Overview</a>
    <a href="dashboard-services.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Services</a>
    <a href="dashboard-projects.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>Projects</a>
    <a href="dashboard-team.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Team</a>
    <a href="dashboard-messages.html" class="nav-item active"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Messages</a>
    <a href="dashboard-blog.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>Blog</a>
    <a href="dashboard-settings.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>Settings</a>
    <a href="dashboard-login.html" id="logout-btn" class="nav-item logout" style="margin-top:auto"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Log Out</a>
  </nav>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-title"><h1>Messages Management</h1><p>View and respond to client inquiries</p></div>
    <div class="topbar-right">
      <div class="notif-btn"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><div class="notif-dot"></div></div>
      <div class="avatar"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#999" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
    </div>
  </div>
  <div class="content">
    <div class="stat-cards">
      <div class="stat-card"><div class="stat-info"><p>Total Messages</p><h2>12</h2><span>All time</span></div><div class="stat-icon"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#39475A" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div></div>
      <div class="stat-card"><div class="stat-info"><p>Unread</p><h2>4</h2><span>Needs attention</span></div><div class="stat-icon"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#39475A" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div></div>
      <div class="stat-card"><div class="stat-info"><p>Replied</p><h2>320</h2><span>Resolved</span></div><div class="stat-icon"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#39475A" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg></div></div>
      <div class="stat-card"><div class="stat-info"><p>This Week</p><h2>33</h2><span>New inquiries</span></div><div class="stat-icon"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#39475A" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div></div>
    </div>
    <div class="filter-bar">
      <div class="filter-group" style="flex:1"><label>Search Messages</label>
        <div class="search-wrap"><svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input class="search-input" placeholder="Search by name, email, or subject..."/></div>
      </div>
      <div class="filter-group"><label>Status</label>
        <select class="f-select" style="min-width:180px"><option>All Messages</option><option>Unread</option><option>Read</option><option>Replied</option></select>
      </div>
    </div>
    <div class="card">
      <div class="msg-list" id="msgList"></div>
      <div class="pagination">
        <span class="pagination-info">Showing 1 to 6 of 143 messages</span>
        <div class="page-btns"><button class="page-btn">Previous</button><button class="page-btn active">1</button><button class="page-btn">2</button><button class="page-btn">3</button><button class="page-btn">Next</button></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg><span id="toastMsg"></span></div>
<script>
const msgs=[
  {name:'Ali Mohammed',status:'unread',tag:'Web Development',subject:'Website Development Quote',preview:'I need a website for my startup. Can we schedule a call to discuss the requirements?',email:'aisha@gmail.com',phone:'+972 598273728',time:'2026-01-25 10:30AM'},
  {name:'Sara Hassan',status:'read',tag:'UI/UX Design',subject:'Design System Request',preview:'We need a complete design system for our mobile application. Please share your portfolio.',email:'sara@gmail.com',phone:'+972 598273728',time:'2026-01-25 9:15AM'},
  {name:'Omar Khalil',status:'unread',tag:'Motion Graphics',subject:'Product Launch Video',preview:'Looking for a team to create a 60-second product launch animation video.',email:'omar@gmail.com',phone:'+972 598273728',time:'2026-01-24 3:45PM'},
  {name:'Lina Yousef',status:'read',tag:'Branding',subject:'Logo & Brand Identity',preview:'Our company needs a complete rebrand. We are a tech startup in the fintech space.',email:'lina@gmail.com',phone:'+972 598273728',time:'2026-01-24 11:20AM'},
  {name:'Karim Nasser',status:'unread',tag:'Web Development',subject:'E-Commerce Platform',preview:'We want to build a full e-commerce platform with payment integration and admin panel.',email:'karim@gmail.com',phone:'+972 598273728',time:'2026-01-23 2:10PM'},
  {name:'Rania Saleh',status:'read',tag:'Graphic Design',subject:'Marketing Materials',preview:'Need a full set of marketing materials including brochure, flyer and social media templates.',email:'rania@gmail.com',phone:'+972 598273728',time:'2026-01-23 10:00AM'},
];
const tagColors={'Web Development':'badge-navy','UI/UX Design':'badge-blue','Motion Graphics':'badge-yellow','Branding':'badge-green','Graphic Design':'badge-gray'};
document.getElementById('msgList').innerHTML=msgs.map((m,i)=>`
  <div class="msg-item ${m.status}" onclick="markRead(${i})">
    <div class="msg-avatar"><svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#B2B2B2" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
    <div class="msg-body">
      <div class="msg-top">
        <span class="msg-name">${m.name}</span>
        <span class="badge ${m.status==='unread'?'badge-red':'badge-gray'}">${m.status}</span>
        <span class="badge ${tagColors[m.tag]||'badge-gray'}">${m.tag}</span>
      </div>
      <div class="msg-subject">${m.subject}</div>
      <div class="msg-preview">${m.preview}</div>
      <div class="msg-meta">
        <span><svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>${m.email}</span>
        <span><svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2A19.79 19.79 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 .84h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>${m.phone}</span>
        <span><svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${m.time}</span>
      </div>
    </div>
    <div class="msg-actions">
      <button class="icon-btn" title="Reply"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 00-4-4H4"/></svg></button>
      <button class="icon-btn" title="Archive"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg></button>
      <button class="icon-btn danger" title="Delete" onclick="deleteMsg(event,${i})"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>
    </div>
  </div>`).join('');

function markRead(i){msgs[i].status='read';document.querySelectorAll('.msg-item')[i].classList.remove('unread');}
function deleteMsg(e,i){e.stopPropagation();document.querySelectorAll('.msg-item')[i].remove();showToast('Message deleted.');}
function showToast(msg){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
</script>
<script src="../js/dashboard_js/messages.js"></script>
<script src="../js/dashboard_js/logout.js"></script>
</body>
</html>
